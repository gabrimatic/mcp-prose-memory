name: Docs Pages

on:
  push:
    branches: [main]
    paths:
      - "doc/**"
      - "README.md"
      - ".github/workflows/docs-pages.yml"
      - "tests/docs-site.test.mjs"
  pull_request:
    branches: [main]
    paths:
      - "doc/**"
      - "README.md"
      - ".github/workflows/docs-pages.yml"
      - "tests/docs-site.test.mjs"
  workflow_dispatch:

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Validate and export docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install package dependencies
        run: npm ci

      - name: Run docs guards
        run: node --test tests/docs-site.test.mjs

      - name: Install Mintlify
        run: npm install -g mint

      - name: Validate docs
        working-directory: doc
        run: mint validate

      - name: Check docs links
        working-directory: doc
        run: mint broken-links

      - name: Export docs
        working-directory: doc
        run: mint export --output ../docs-export.zip

      - name: Unpack export
        run: |
          mkdir _site
          unzip -q docs-export.zip -d _site

      - name: Prepare for GitHub Pages
        run: node doc/scripts/prepare-github-pages.mjs _site /mcp-prose-memory

      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: _site

  deploy:
    name: Deploy docs
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Deploy Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
