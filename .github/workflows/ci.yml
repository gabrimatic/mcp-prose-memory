name: CI

on:
  push:
    paths-ignore:
      - "doc/**"
      - "README.md"
      - ".github/workflows/docs-pages.yml"
      - "tests/docs-site.test.mjs"
  pull_request:
    paths-ignore:
      - "doc/**"
      - "README.md"
      - ".github/workflows/docs-pages.yml"
      - "tests/docs-site.test.mjs"

jobs:
  check:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check
