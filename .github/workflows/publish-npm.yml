name: Publish npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-24.04
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          node -e "const tag = process.env.GITHUB_REF_NAME.replace(/^v/, ''); const pkg = require('./package.json'); if (pkg.version !== tag) { throw new Error(`Tag v${tag} does not match package version ${pkg.version}`); }"

      - name: Test
        run: npm test

      - name: Publish package
        run: npm publish --access public
