name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v3.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  github-release:
    name: GitHub release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Check tag matches package version
        run: |
          node -e "const tag = process.env.RELEASE_TAG.replace(/^v/, ''); const pkg = require('./package.json'); if (pkg.version !== tag) { throw new Error(`Tag v${tag} does not match package version ${pkg.version}`); }"
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Test
        run: npm test

      - name: Pack
        run: npm pack

      - name: Write checksums
        run: shasum -a 256 mcp-prose-memory-*.tgz > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" mcp-prose-memory-*.tgz checksums.txt --clobber
          else
            gh release create "$RELEASE_TAG" mcp-prose-memory-*.tgz checksums.txt \
              --title "$RELEASE_TAG" \
              --notes "See CHANGELOG.md for release notes."
          fi
