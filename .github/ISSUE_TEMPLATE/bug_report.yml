name: Bug report
description: Report broken or surprising behavior in mcp-prose-memory.
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing what broke.
      placeholder: "Replacing a fact succeeds, but the memory file is not updated."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The shortest path that reproduces the issue.
      placeholder: |
        1. Start the server with MEMORY_PATH=/tmp/memory.json
        2. Add a fact to the work section
        3. Replace line 1
        4. Inspect the JSON file
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: The expected result.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead, including any error messages.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `npm view mcp-prose-memory version` or the local `package.json` version.
      placeholder: "3.0.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      description: Output of `node --version`.
      placeholder: "v22.19.0"
    validations:
      required: true

  - type: input
    id: client
    attributes:
      label: MCP client
      description: Name and version of the MCP client that starts the server.
      placeholder: "Desktop client, CLI client, or another MCP client"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: MCP server config and `MEMORY_PATH` behavior. Redact private paths if needed.
      render: json
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant stderr or MCP client logs. Redact private memory contents.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that helps with triage.
    validations:
      required: false
