name: Feature request
description: Suggest a focused mcp-prose-memory improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One line describing the capability you want.
      placeholder: "Add an export command for a single memory section."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What pain point or limitation this addresses.
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - MCP tool behavior
        - JSON storage
        - Package or install
        - Documentation
        - Tests or CI
        - Other
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed behavior
      description: Describe the behavior, schema, or API you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why they fall short.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Examples, prior art, or anything else relevant.
    validations:
      required: false
